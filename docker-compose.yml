services:
  # -----------------------------------------------------------------------
  # WIE - Web Investigator Engine MCP Server
  # -----------------------------------------------------------------------
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wie-mcp-server
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_HOST=http://searxng:8080
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
      - SEARCH_DEFAULT_LIMIT=10
      - SEARCH_TIMEOUT_SECONDS=10
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp-net

  # -----------------------------------------------------------------------
  # SearxNG — local meta-search engine, API-only
  # -----------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: wie-searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge
